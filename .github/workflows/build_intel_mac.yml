name: Build PyTorch for Intel Mac

on:
  workflow_dispatch:
    inputs:
      pytorch_version:
        description: 'PyTorch version tag (e.g. v2.6.0)'
        required: true
        type: string
        default: 'v2.9.1'
      macos_version:
        description: 'macOS runner version (15 or 26)'
        required: true
        type: choice
        options:
          - '15'
          - '26'
      python_version:
        description: 'Python version (e.g. 3.10)'
        required: true
        type: string
        default: '3.10'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.pytorch_version }}-${{ inputs.macos_version }}-${{ inputs.python_version }}
  cancel-in-progress: true

jobs:
  check-existing:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      tag_name: ${{ steps.vars.outputs.tag_name }}
      wheel_name: ${{ steps.vars.outputs.wheel_name }}
    steps:
      - name: Set variables
        id: vars
        run: |
          VER_NO_V="${PT_VER#v}"
          PY_ABI="cp${PY_VER//.}"
          MACOS_DEPLOY_TARGET="10.15"
          WHEEL_NAME="torch-${VER_NO_V}-${PY_ABI}-${PY_ABI}-macosx_${MACOS_DEPLOY_TARGET}_x86_64.whl"
          TAG_NAME="torch-${VER_NO_V}-macos${MACOS_VER}-py${PY_VER}"
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "wheel_name=${WHEEL_NAME}" >> $GITHUB_OUTPUT
        env:
          PT_VER: ${{ inputs.pytorch_version }}
          PY_VER: ${{ inputs.python_version }}
          MACOS_VER: ${{ inputs.macos_version }}

      - name: Check if release asset already exists
        id: check
        run: |
          if ASSETS=$(gh release view "${{ steps.vars.outputs.tag_name }}" --json assets -q ".assets[].name" 2>/dev/null); then
            if echo "$ASSETS" | grep -qF "${{ steps.vars.outputs.wheel_name }}"; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "Release with the same wheel already exists. Skipping build."
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "No existing release found for tag ${{ steps.vars.outputs.tag_name }}."
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    needs: check-existing
    if: needs.check-existing.outputs.skip == 'false'
    runs-on: ${{ inputs.macos_version == '15' && 'macos-15-intel' || 'macos-26-intel' }}
    timeout-minutes: 720
    steps:
      - name: Checkout PyTorch source code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pytorch_version }}
          submodules: recursive

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ inputs.python_version }}
          miniforge-version: latest
          activate-environment: build

      # 安装依赖：MKL + Intel OpenMP（必须同时安装以保证兼容）
      - name: Install build & runtime dependencies
        shell: bash -el {0}
        run: |
          conda install -y \
            mkl mkl-include intel-openmp \
            numpy ninja pyyaml setuptools cmake cffi \
            typing_extensions future six requests dataclasses
          brew install cmake ninja ccache
          ccache -M 5G

      - name: Cache ccache objects
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/ccache
          key: ${{ runner.os }}-ccache-${{ inputs.pytorch_version }}-${{ inputs.python_version }}-v3
          restore-keys: |
            ${{ runner.os }}-ccache-${{ inputs.pytorch_version }}-${{ inputs.python_version }}-

      - name: Restore ccache environment
        run: |
          mkdir -p ${{ github.workspace }}/ccache
          echo "CCACHE_DIR=${{ github.workspace }}/ccache" >> $GITHUB_ENV
          echo "/usr/local/opt/ccache/libexec" >> $GITHUB_PATH

      - name: Fix script permissions
        run: |
          chmod +x scripts/build_host_protoc.sh
          find scripts -name "*.sh" -exec chmod +x {} \;

      - name: Build PyTorch wheel (CPU+MKL, no tests)
        shell: bash -el {0}
        run: |
          export MACOSX_DEPLOYMENT_TARGET=10.15
          export CMAKE_OSX_ARCHITECTURES=x86_64
          export CMAKE_POLICY_VERSION_MINIMUM=3.5

          export USE_MKL=1
          export BLAS=MKL
          export BUILD_TEST=0
          export USE_MPS=0
          export USE_METAL=0
          export USE_VULKAN=0
          export USE_NCCL=0
          export USE_DISTRIBUTED=0
          export USE_CUDA=0

          python setup.py bdist_wheel

      # 关键修复：设置库搜索路径，然后打包所有外部动态库
      - name: Bundle shared libraries with delocate
        shell: bash -el {0}
        run: |
          python -m pip install delocate
          # 把 conda 环境的 lib 目录（含 libiomp5.dylib）加入搜索路径
          export DYLD_LIBRARY_PATH=$CONDA_PREFIX/lib:$DYLD_LIBRARY_PATH
          delocate-wheel -v dist/*.whl

      - name: Locate wheel file
        id: wheel
        shell: bash
        run: |
          WHL=$(ls dist/*.whl | head -1)
          echo "path=${WHL}" >> $GITHUB_OUTPUT
          echo "name=$(basename ${WHL})" >> $GITHUB_OUTPUT

      - name: Upload wheel as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pytorch-intel-wheel
          path: ${{ steps.wheel.outputs.path }}

      - name: Create/Update Release and upload wheel
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-existing.outputs.tag_name }}
          name: "PyTorch ${{ inputs.pytorch_version }} • macOS ${{ inputs.macos_version }} • Python ${{ inputs.python_version }}"
          body: |
            **Community Build for Intel Mac** (fully portable)
            - PyTorch version: `${{ inputs.pytorch_version }}`
            - Built on: `macos-${{ inputs.macos_version }}-intel`
            - Python: `${{ inputs.python_version }}`
            - Wheel: `${{ steps.wheel.outputs.name }}`

            📦 **This wheel includes MKL & Intel OpenMP – no extra installs needed.**

            Install with:
            ```
            pip install ${{ steps.wheel.outputs.name }}
            ```
          files: ${{ steps.wheel.outputs.path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
