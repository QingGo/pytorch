name: Build PyTorch for Intel Mac (Portable, Accelerate)

on:
  workflow_dispatch:
    inputs:
      pytorch_version:
        description: 'PyTorch version tag (e.g. v2.6.0)'
        required: true
        type: string
        default: 'v2.9.1'
      macos_version:
        description: 'macOS runner version (15 or 26)'
        required: true
        type: choice
        options:
          - '15'
          - '26'
      python_version:
        description: 'Python version (e.g. 3.10)'
        required: true
        type: string
        default: '3.10'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.pytorch_version }}-${{ inputs.macos_version }}-${{ inputs.python_version }}
  cancel-in-progress: true

jobs:
  check-existing:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      tag_name: ${{ steps.vars.outputs.tag_name }}
      wheel_name: ${{ steps.vars.outputs.wheel_name }}
    steps:
      - name: Set variables
        id: vars
        run: |
          VER_NO_V="${PT_VER#v}"
          PY_ABI="cp${PY_VER//.}"
          MACOS_DEPLOY_TARGET="10.15"
          WHEEL_NAME="torch-${VER_NO_V}-${PY_ABI}-${PY_ABI}-macosx_${MACOS_DEPLOY_TARGET}_x86_64.whl"
          TAG_NAME="torch-${VER_NO_V}-macos${MACOS_VER}-py${PY_VER}-accelerate"
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "wheel_name=${WHEEL_NAME}" >> $GITHUB_OUTPUT
        env:
          PT_VER: ${{ inputs.pytorch_version }}
          PY_VER: ${{ inputs.python_version }}
          MACOS_VER: ${{ inputs.macos_version }}

      - name: Check if release asset already exists
        id: check
        run: |
          if ASSETS=$(gh release view "${{ steps.vars.outputs.tag_name }}" --json assets -q ".assets[].name" 2>/dev/null); then
            if echo "$ASSETS" | grep -qF "${{ steps.vars.outputs.wheel_name }}"; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "Release with the same wheel already exists. Skipping build."
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "No existing release found for tag ${{ steps.vars.outputs.tag_name }}."
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    needs: check-existing
    if: needs.check-existing.outputs.skip == 'false'
    runs-on: ${{ inputs.macos_version == '15' && 'macos-15-intel' || 'macos-26-intel' }}
    timeout-minutes: 720
    steps:
      - name: Checkout PyTorch source code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pytorch_version }}
          submodules: recursive

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ inputs.python_version }}
          miniforge-version: latest
          activate-environment: build

      - name: Install build dependencies
        shell: bash -el {0}
        run: |
          conda install -y \
            numpy ninja pyyaml setuptools cmake cffi \
            typing_extensions future six requests dataclasses \
            llvm-openmp
          brew install cmake ninja ccache
          ccache -M 5G

      - name: Cache ccache objects
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/ccache
          key: ${{ runner.os }}-ccache-${{ inputs.pytorch_version }}-${{ inputs.python_version }}-v4
          restore-keys: |
            ${{ runner.os }}-ccache-${{ inputs.pytorch_version }}-${{ inputs.python_version }}-

      - name: Restore ccache environment
        run: |
          mkdir -p ${{ github.workspace }}/ccache
          echo "CCACHE_DIR=${{ github.workspace }}/ccache" >> $GITHUB_ENV
          echo "/usr/local/opt/ccache/libexec" >> $GITHUB_PATH

      - name: Fix script permissions
        run: |
          chmod +x scripts/build_host_protoc.sh
          find scripts -name "*.sh" -exec chmod +x {} \;

      - name: Build PyTorch wheel (CPU, Accelerate via vecLib, no tests)
        shell: bash -el {0}
        run: |
          export MACOSX_DEPLOYMENT_TARGET=10.15
          export CMAKE_OSX_ARCHITECTURES=x86_64
          export CMAKE_POLICY_VERSION_MINIMUM=3.5

          export SDKROOT=$(xcrun --show-sdk-path)
          export VECLIB_INCLUDE_DIR="$SDKROOT/System/Library/Frameworks/Accelerate.framework/Versions/A/Frameworks/vecLib.framework/Headers"

          export USE_MKL=0
          export BLAS=vecLib
          export BUILD_TEST=0
          export USE_MPS=0
          export USE_METAL=0
          export USE_VULKAN=0
          export USE_NCCL=0
          export USE_DISTRIBUTED=1
          export USE_CUDA=0

          python setup.py bdist_wheel

      # ✅ 关键步骤 1：在 delocate 前统一 OpenMP 路径
      - name: Fix OpenMP paths to avoid duplicate bundling
        shell: bash -el {0}
        run: |
          # 定义 wheel 内库文件目标目录
          # （根据macOS版本，可能略有不同，此处为常见路径）
          TARGET_LIB_DIR="build/lib/torch/lib"

          # 查找并复制单个 libomp.dylib 到目标目录
          OMP_LIB_SOURCE=$(find $CONDA_PREFIX/lib /usr/local/lib /opt/homebrew/lib -name "libomp.dylib" 2>/dev/null | head -1)
          if [ -z "$OMP_LIB_SOURCE" ]; then
            echo "Error: Could not find libomp.dylib in conda or system paths."
            exit 1
          fi
          cp "$OMP_LIB_SOURCE" "$TARGET_LIB_DIR/"

          # 修改所有需要 libomp 的库，将其引用统一为 @loader_path/libomp.dylib
          cd "$TARGET_LIB_DIR"
          for lib in libtorch_cpu.dylib libtorch_python.dylib libtorch.dylib libtorch_global_deps.dylib; do
            if [ -f "$lib" ]; then
              # 检查并修复 libomp 引用
              install_name_tool -change "@rpath/libomp.dylib" "@loader_path/libomp.dylib" "$lib" 2>/dev/null || true
              echo "Fixed libomp reference in $lib"
            fi
          done
          cd -

      - name: Bundle shared libraries with delocate
        shell: bash -el {0}
        run: |
          python -m pip install delocate
          export DYLD_LIBRARY_PATH=$CONDA_PREFIX/lib:$DYLD_LIBRARY_PATH
          delocate-wheel -v dist/*.whl

      - name: Locate wheel file
        id: wheel
        shell: bash
        run: |
          WHL=$(ls dist/*.whl | head -1)
          echo "path=${WHL}" >> $GITHUB_OUTPUT
          echo "name=$(basename ${WHL})" >> $GITHUB_OUTPUT

      - name: Upload wheel as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pytorch-intel-wheel-vecLib
          path: ${{ steps.wheel.outputs.path }}

      - name: Create/Update Release and upload wheel
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-existing.outputs.tag_name }}
          name: "PyTorch ${{ inputs.pytorch_version }} • Accelerate (vecLib) • macOS ${{ inputs.macos_version }} • Python ${{ inputs.python_version }}"
          body: |
            **Community Build for Intel Mac (using Apple Accelerate / vecLib)**
            - PyTorch version: `${{ inputs.pytorch_version }}`
            - Built on: `macos-${{ inputs.macos_version }}-intel`
            - Python: `${{ inputs.python_version }}`
            - BLAS: Apple Accelerate (vecLib)
            - Wheel: `${{ steps.wheel.outputs.name }}`

            ✅ **No MKL dependencies, fixed OMP conflict – just install and go.**
            
            Install with:
            ```
            pip install ${{ steps.wheel.outputs.name }}
            ```
          files: ${{ steps.wheel.outputs.path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
