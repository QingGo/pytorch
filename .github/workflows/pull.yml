name: pull

on:
  pull_request:
    branches-ignore:
      - nightly
  push:
    branches:
      - main
      - release/*
      - landchecks/*
    tags:
      - ciflow/pull/*
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}-${{ github.event_name == 'workflow_dispatch' && github.run_id }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  actions: read

env:
  NUM_TEST_SHARDS: 10

jobs:
  build:
    if: github.repository_owner == 'pytorch'
    name: build
    runs-on: linux.4xlarge
    container:
      image: ghcr.io/pytorch/ci-image:pytorch-linux-jammy-cuda13.0-cudnn9-py3.10-clang18
    timeout-minutes: 480
    steps:
      - name: Setup Linux
        id: setup-linux
        uses: pytorch/pytorch/.github/actions/setup-linux@main
        with:
          use-arc: true
          python-version: "3.10"
          compiler: clang18
          cuda-version: "13.0"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        id: aws-creds
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          role-to-assume: arn:aws:iam::308535385114:role/arc
          aws-region: us-east-1
          role-duration-seconds: 18000

      - name: Build
        id: build
        env:
          BUILD_ENVIRONMENT: linux-jammy-cuda13.0-cudnn9-py3.10-clang18
          BRANCH: ${{ steps.setup-linux.outputs.branch }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA1: ${{ github.event.pull_request.head.sha || github.sha }}
          SCCACHE_BUCKET: ossci-compiler-cache-circleci-v2
          SCCACHE_REGION: us-east-1
          SCCACHE_S3_NO_CREDENTIALS: ${{ steps.aws-creds.outcome != 'success' && 'true' || 'false' }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          TORCH_CUDA_ARCH_LIST: "7.5"
          OUR_GITHUB_JOB_ID: ${{ steps.setup-linux.outputs.job-id }}
          SKIP_SCCACHE_INITIALIZATION: 1
        shell: bash
        run: |
          .ci/pytorch/build.sh

      - name: Archive artifacts into zip
        run: |
          zip -1 -r artifacts.zip dist/ build/custom_test_artifacts build/lib build/bin .additional_ci_files

      - name: Store PyTorch Build Artifacts on S3
        uses: seemethere/upload-artifact-s3@baba72d0712b404f646cebe0730933554ebce96a
        with:
          name: linux-jammy-cuda13.0-cudnn9-py3.10-clang18
          retention-days: 14
          if-no-files-found: error
          path: artifacts.zip
          s3-bucket: gha-artifacts

  collect-tests:
    if: github.repository_owner == 'pytorch'
    name: collect-tests
    needs: build
    runs-on: linux.g4dn.4xlarge.nvidia.gpu
    container:
      image: ghcr.io/pytorch/ci-image:pytorch-linux-jammy-cuda13.0-cudnn9-py3.10-clang18
      options: --gpus all
    timeout-minutes: 30
    outputs:
      shard-matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - name: Setup Linux
        uses: pytorch/pytorch/.github/actions/setup-linux@main
        with:
          use-arc: true
          python-version: "3.10"
          compiler: clang18
          cuda-version: "13.0"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        id: aws-creds
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          role-to-assume: arn:aws:iam::308535385114:role/arc
          aws-region: us-east-1
          role-duration-seconds: 18000

      - name: Download build artifacts
        uses: seemethere/download-artifact-s3@1da556a7aa0a088e3153970611f6c432d58e80e6
        with:
          name: linux-jammy-cuda13.0-cudnn9-py3.10-clang18
          path: .
          s3-bucket: gha-artifacts

      - name: Install PyTorch
        shell: bash
        run: |
          unzip artifacts.zip
          python3.10 -m venv --system-site-packages /tmp/test-venv
          source /tmp/test-venv/bin/activate
          pip install -r requirements.txt
          pip install dist/*.whl

      - name: Collect CUDA tests
        shell: bash
        run: |
          source /tmp/test-venv/bin/activate
          python tools/zippo collect --output /tmp/cuda-tests.json -m cuda test

      - name: Upload collected tests
        uses: actions/upload-artifact@v4
        with:
          name: cuda-tests
          path: /tmp/cuda-tests.json
          retention-days: 1

      - name: Generate shard matrix
        id: generate-matrix
        shell: bash
        run: |
          echo "matrix=$(python3 -c "import json; print(json.dumps(list(range($NUM_TEST_SHARDS))))")" >> "$GITHUB_OUTPUT"

  test:
    if: github.repository_owner == 'pytorch'
    name: test (${{ matrix.shard }})
    needs: [build, collect-tests]
    runs-on: linux.g4dn.4xlarge.nvidia.gpu
    container:
      image: ghcr.io/pytorch/ci-image:pytorch-linux-jammy-cuda13.0-cudnn9-py3.10-clang18
      options: --gpus all
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.collect-tests.outputs.shard-matrix) }}
    steps:
      - name: Setup Linux
        uses: pytorch/pytorch/.github/actions/setup-linux@main
        with:
          use-arc: true
          python-version: "3.10"
          compiler: clang18
          cuda-version: "13.0"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        id: aws-creds
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          role-to-assume: arn:aws:iam::308535385114:role/arc
          aws-region: us-east-1
          role-duration-seconds: 18000

      - name: Download build artifacts
        uses: seemethere/download-artifact-s3@1da556a7aa0a088e3153970611f6c432d58e80e6
        with:
          name: linux-jammy-cuda13.0-cudnn9-py3.10-clang18
          path: .
          s3-bucket: gha-artifacts

      - name: Download collected tests
        uses: actions/download-artifact@v4
        with:
          name: cuda-tests
          path: /tmp

      - name: Install PyTorch
        shell: bash
        run: |
          unzip artifacts.zip
          python3.10 -m venv --system-site-packages /tmp/test-venv
          source /tmp/test-venv/bin/activate
          pip install -r requirements.txt
          pip install dist/*.whl

      - name: Run tests
        shell: bash
        run: |
          source /tmp/test-venv/bin/activate
          REPO_ROOT="$(pwd)"
          python tools/zippo shard \
            --input /tmp/cuda-tests.json \
            --num-shards ${{ env.NUM_TEST_SHARDS }} \
            --shard-id ${{ matrix.shard }} \
            --output /tmp/shard-tests.txt
          if [ ! -s /tmp/shard-tests.txt ]; then
            echo "No tests assigned to shard ${{ matrix.shard }}"
            exit 0
          fi
          # Run from outside the repo root so the source ./torch tree doesn't
          # shadow the installed wheel during `import torch`.
          sed "s|^|$REPO_ROOT/|" /tmp/shard-tests.txt > /tmp/shard-tests-abs.txt
          cd /tmp
          xargs -d '\n' -a /tmp/shard-tests-abs.txt python -m pytest --continue-on-collection-errors --
